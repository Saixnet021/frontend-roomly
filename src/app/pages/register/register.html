<div class="min-h-screen w-full bg-white flex flex-col md:flex-row font-poppins relative">

  <!-- Left Section -->
  <div
    class="md:w-[55%] w-full bg-gradient-to-br from-[#d400ff] to-[#6a00a3] md:rounded-r-[70px] z-10 flex flex-col justify-center px-10 md:px-16 py-12 relative shadow-[10px_0_30px_rgba(0,0,0,0.1)] min-h-[40vh] md:min-h-screen">
    <!-- Navigation -->
    <nav
      class="absolute top-8 right-10 flex flex-col items-end gap-5 text-white font-bold text-[15px] z-20 hidden md:flex">
      <a routerLink="/" class="hover:text-white/80 transition-colors">Menu</a>
      <a routerLink="/login" class="hover:text-white/80 transition-colors">Login</a>
      <a routerLink="/register" class="hover:text-white/80 transition-colors">Register</a>
    </nav>
    <!-- Mobile Navigation -->
    <nav class="flex md:hidden flex-row gap-5 text-white font-bold text-[15px] z-20 mb-8 self-center">
      <a routerLink="/" class="hover:text-white/80 transition-colors">Menu</a>
      <a routerLink="/login" class="hover:text-white/80 transition-colors">Login</a>
      <a routerLink="/register"
        class="hover:text-white/80 transition-colors bg-white/20 px-3 py-1 rounded-full">Register</a>
    </nav>

    <div class="mt-8 md:mt-0 max-w-[500px]">
      <h1 class="text-white text-[46px] md:text-[5vw] leading-[1.1] mb-1 font-light tracking-tight">Únete a</h1>
      <h1 class="text-white text-[64px] md:text-[7vw] font-black leading-[1.1] mb-8 tracking-tight">Roomly</h1>
      <p class="text-white/95 font-medium text-[19px] md:text-[22px] leading-[1.4]">
        Empieza a gestionar tus propiedades<br>con la plataforma más avanzada<br>del mercado
      </p>
    </div>
  </div>

  <!-- Right Section -->
  <div
    class="md:w-[45%] w-full bg-white flex flex-col items-center justify-center p-8 md:p-12 relative min-h-[60vh] md:min-h-screen overflow-y-auto">

    <div class="w-full max-w-[400px] flex flex-col items-center">
      <!-- Logo Box -->
      <div
        class="w-[90px] h-[90px] rounded-full bg-gradient-to-b from-[#1c092b] to-[#12051e] flex flex-col items-center justify-center mb-8 relative shadow-xl border overflow-hidden shrink-0"
        style="border-color: rgba(255,255,255,0.05);">
        <!-- Styled "R" -->
        <span class="text-[rgb(193,130,221)] text-[48px] font-serif font-bold italic leading-none relative z-10 mr-1"
          style="text-shadow: 0px 0px 10px rgba(193,130,221,0.5);">R</span>
        <span class="text-[rgb(193,130,221)] text-[7px] font-bold tracking-[0.2em] mt-1 relative z-10">ROOMLY</span>
        <span
          class="text-[rgb(193,130,221)] text-[5px] font-bold tracking-[0.25em] opacity-60 relative z-10">GROUP</span>
      </div>

      <!-- Form inside box without border -->
      <div class="w-full rounded-lg py-4 px-6 box-border shrink-0">
        <form (ngSubmit)="registrar()" class="flex flex-col gap-5">

          @if (errorMessage) {
          <div class="bg-red-50 text-red-600 text-[13px] p-3 rounded-md font-medium border border-red-100">
            {{ errorMessage }}
          </div>
          }

          <div class="flex flex-col gap-1.5">
            <label class="text-[#333333] text-[12px] font-semibold tracking-wide">Nombre de la Empresa</label>
            <input type="text" placeholder="Ej. Depas Said" [(ngModel)]="usuario.company" name="company"
              inputmode="text" maxlength="30" pattern="^[A-Za-zÀ-ÿ ]+$"
              (input)="usuario.company = (usuario.company || '').toString().replace(/[^A-Za-zÀ-ÿ ]/g, '').slice(0,30)"
              title="Solo letras y espacios. Sin caracteres especiales."
              class="px-3.5 py-2.5 border border-gray-200 rounded-md text-[13px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full transition-all"
              required>
          </div>

          <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex flex-col gap-1.5 w-full sm:w-1/2">
              <label class="text-[#333333] text-[12px] font-semibold tracking-wide">Nombre</label>
              <input type="text" placeholder="Nombre" [(ngModel)]="usuario.firstName" name="firstName"
                class="px-3.5 py-2.5 border border-gray-200 rounded-md text-[13px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full transition-all"
                required>
            </div>
            <div class="flex flex-col gap-1.5 w-full sm:w-1/2">
              <label class="text-[#333333] text-[12px] font-semibold tracking-wide">Apellidos</label>
              <input type="text" placeholder="Apellidos" [(ngModel)]="usuario.lastName" name="lastName"
                class="px-3.5 py-2.5 border border-gray-200 rounded-md text-[13px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full transition-all"
                required>
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[#333333] text-[12px] font-semibold tracking-wide">Correo electronico</label>
            <input type="email" placeholder="nicole@gmail.com" [(ngModel)]="usuario.email" name="email"
              class="px-3.5 py-2.5 border border-gray-200 rounded-md text-[13px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full transition-all"
              required>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[#333333] text-[12px] font-semibold tracking-wide">Contraseña</label>
            <input type="password" placeholder="*********" [(ngModel)]="usuario.password" name="password"
              class="px-3.5 py-2.5 border border-gray-200 rounded-md text-[13px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full tracking-[0.2em] transition-all"
              required>
          </div>

          <button type="submit"
            class="w-full bg-[#2a2a2a] text-white text-[14px] font-semibold py-3.5 rounded-md focus:outline-none hover:bg-black transition-colors duration-300 mt-2">
            Registrarme
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
