<div class="min-h-screen w-full bg-white flex flex-col md:flex-row font-poppins relative">
    
    <!-- Left Section -->
    <div class="md:w-[55%] w-full bg-gradient-to-br from-[#d400ff] to-[#6a00a3] md:rounded-r-[70px] z-10 flex flex-col justify-center px-10 md:px-16 py-12 relative shadow-[10px_0_30px_rgba(0,0,0,0.1)] min-h-[40vh] md:min-h-screen">
      <!-- Navigation -->
      <nav class="absolute top-8 right-10 flex flex-col items-end gap-5 text-white font-bold text-[15px] z-20 hidden md:flex">
        <a routerLink="/" class="hover:text-white/80 transition-colors">Menu</a>
        <a routerLink="/login" class="hover:text-white/80 transition-colors">Login</a>
        <a routerLink="/register" class="hover:text-white/80 transition-colors">Register</a>
      </nav>
      <!-- Mobile Navigation -->
      <nav class="flex md:hidden flex-row gap-5 text-white font-bold text-[15px] z-20 mb-8 self-center">
        <a routerLink="/" class="hover:text-white/80 transition-colors">Menu</a>
        <a routerLink="/login" class="hover:text-white/80 transition-colors bg-white/20 px-3 py-1 rounded-full">Login</a>
        <a routerLink="/register" class="hover:text-white/80 transition-colors">Register</a>
      </nav>

      <div class="mt-8 md:mt-0 max-w-[500px]">
        <h1 class="text-white text-[46px] md:text-[5vw] leading-[1.1] mb-1 font-light tracking-tight">Bienvenido a</h1>
        <h1 class="text-white text-[64px] md:text-[7vw] font-black leading-[1.1] mb-8 tracking-tight">Roomly</h1>
        <p class="text-white/95 font-medium text-[19px] md:text-[22px] leading-[1.4]">
          Gestiona tus propiedades con<br>la plataforma más avanzada<br>del mercado
        </p>
      </div>
    </div>

    <!-- Right Section -->
    <div class="md:w-[45%] w-full bg-white flex flex-col items-center justify-center p-8 md:p-12 relative min-h-[60vh] md:min-h-screen">
      
      <div class="w-full max-w-[380px] flex flex-col items-center">
        <!-- Logo Box -->
        <div class="w-[140px] h-[140px] rounded-full bg-gradient-to-b from-[#1c092b] to-[#12051e] flex flex-col items-center justify-center mb-10 relative shadow-xl border overflow-hidden" style="border-color: rgba(255,255,255,0.05);">
          <!-- Styled "R" -->
          <span class="text-[rgb(193,130,221)] text-[72px] font-serif font-bold italic leading-none relative z-10 mr-1" style="text-shadow: 0px 0px 15px rgba(193,130,221,0.5);">R</span>
          <!-- Small element overlapping -->
          <div class="absolute top-[58px] left-[40px] text-[#e0baf2] text-[12px] opacity-80 z-20"><i class="fa-solid fa-border-all"></i></div>
          <!-- Text at bottom -->
          <span class="text-[rgb(193,130,221)] text-[11px] font-bold tracking-[0.2em] mt-1 relative z-10">ROOMLY</span>
          <span class="text-[rgb(193,130,221)] text-[8px] font-bold tracking-[0.25em] opacity-60 relative z-10">GROUP</span>
        </div>

        <!-- Form inside box without border -->
        <div class="w-full rounded-lg py-5 px-8 box-border">
          <form (ngSubmit)="login()" class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-[#333333] text-[13px] font-semibold tracking-wide">Correo electronico</label>
              <input type="email" placeholder="nicole@gmail.com" [(ngModel)]="usuario.email" name="email" 
                class="px-4 py-3 border border-gray-200 rounded-md text-[14px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full transition-all"
                required>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-[#333333] text-[13px] font-semibold tracking-wide">Contraseña</label>
              <input [type]="mostrarPassword ? 'text' : 'password'" placeholder="*********" [(ngModel)]="usuario.password" name="password" 
                class="px-4 py-3 border border-gray-200 rounded-md text-[14px] focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-200 text-gray-700 placeholder-gray-400 w-full tracking-[0.2em] transition-all"
                required>
            </div>

            <div class="flex items-center gap-2.5 mt-2">
              <div class="relative flex items-center justify-center">
                <input type="checkbox" id="remember_login" class="peer appearance-none w-[16px] h-[16px] rounded-[3px] border border-gray-300 checked:bg-[#282828] checked:border-[#282828] cursor-pointer transition-colors shrink-0">
                <i class="fa-solid fa-check absolute text-[10px] text-white pointer-events-none opacity-0 peer-checked:opacity-100"></i>
              </div>
              <label for="remember_login" class="text-[#444444] text-[13px] font-medium cursor-pointer select-none">Recordar contraseña</label>
            </div>

            @if (errorMessage) {
              <div class="text-red-500 text-[13px] font-semibold text-center mt-2 animate-pulse">
                {{ errorMessage }}
              </div>
            }

            <button type="submit" class="w-full bg-[#2a2a2a] text-white text-[14px] font-semibold py-3.5 rounded-md focus:outline-none hover:bg-black transition-colors duration-300 mt-2">
              Iniciar Sesión
            </button>
          </form>
        </div>
      </div>

    </div>
</div>
